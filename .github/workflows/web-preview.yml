name: Web Preview

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Get project
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate web platform
        run: flutter create . --platforms=web

      - name: Install packages
        run: flutter pub get

      - name: Check code
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build web release
        run: flutter build web --release --base-href /mystic-tarot/

      - name: Validate release assets
        run: |
          test -f build/web/manifest.json
          test -f build/web/privacy.html
          test -f build/web/terms.html
          test -f build/web/support.html
          test -f build/web/icons/Icon-512.png
          grep -q "Mystic Tarot" build/web/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload preview
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Publish preview
        id: deployment
        uses: actions/deploy-pages@v4

# Pages enabled; deployment retriggered.
