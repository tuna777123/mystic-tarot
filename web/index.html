<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="description" content="Mystic Tarot is a private daily tarot ritual with reflective readings, pattern memory, a personal journal, and an evolving Arcana collection.">
  <meta name="theme-color" content="#090816">
  <meta name="color-scheme" content="dark">
  <meta name="robots" content="index,follow">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Mystic Tarot — Your patterns are already speaking">
  <meta property="og:description" content="Reveal the cards, track what returns, and turn insight into a private daily ritual.">
  <meta property="og:url" content="https://tuna777123.github.io/mystic-tarot/">
  <meta property="og:image" content="https://tuna777123.github.io/mystic-tarot/icons/Icon-512.png">
  <meta name="twitter:card" content="summary_large_image">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mystic Tarot">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <title>Mystic Tarot — Private Daily Tarot Ritual</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #080711;
    }
    body {
      position: fixed;
      inset: 0;
      overscroll-behavior: none;
    }
    #install-app {
      position: fixed;
      z-index: 9999;
      right: 18px;
      bottom: 18px;
      display: none;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border: 1px solid rgba(232,199,122,.55);
      border-radius: 999px;
      color: #090816;
      background: #e8c77a;
      box-shadow: 0 12px 35px rgba(0,0,0,.4);
      font: 700 13px/1 Arial, sans-serif;
      cursor: pointer;
    }
    #install-app.visible { display: flex; }
    @media (display-mode: standalone) {
      #install-app { display: none !important; }
    }
  </style>
</head>
<body>
  <button id="install-app" type="button" aria-label="Install Mystic Tarot">✦ Install Mystic</button>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    let installPrompt = null;
    const installButton = document.getElementById('install-app');
    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      installPrompt = event;
      installButton.classList.add('visible');
    });
    installButton.addEventListener('click', async () => {
      if (!installPrompt) return;
      installPrompt.prompt();
      await installPrompt.userChoice;
      installPrompt = null;
      installButton.classList.remove('visible');
    });
    window.addEventListener('appinstalled', () => {
      installPrompt = null;
      installButton.classList.remove('visible');
    });
  </script>
</body>
</html>
